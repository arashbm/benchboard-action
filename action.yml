name: Benchboard
description:
  Run benchmarks and send results to Benchboard for performance tracking
author: arashbm

branding:
  icon: trending-up
  color: blue

inputs:
  project:
    description: Project name
    required: true
  benchmark-command:
    description: Benchmark command to run (should output JSON)
    required: true
  token:
    description: Benchboard ingest token
    required: true
  repo-owner:
    description: Repository owner
    required: false
    default: ${{ github.repository_owner }}
  repo-name:
    description: Repository name
    required: false
    default: ${{ github.event.repository.name }}
  machine-name:
    description: Machine name identifier
    required: false
    default: 'github-actions'
  endpoint:
    description: Benchboard API endpoint URL
    required: false
    default: 'https://api.benchboard.com'
  repo-path:
    description: Path to git repository
    required: false
    default: '.'
  github-run-id:
    description: GitHub Actions run ID
    required: false
    default: ${{ github.run_id }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - run: npm install -g https://github.com/arashbm/benchboard-client
      shell: bash

    - run: >
        benchboard-cli
        --project ${{ inputs.project }}
        --token ${{ inputs.token }}
        --repo-owner ${{ inputs.repo-owner }}
        --repo-name ${{ inputs.repo-name }}
        --machine-name ${{ inputs.machine-name }}
        --endpoint ${{ inputs.endpoint }}
        --repo-path ${{ inputs.repo-path }}
        --github-run-id ${{ inputs.github-run-id }}
        -- ${{ inputs.benchmark-command }}
      shell: bash
